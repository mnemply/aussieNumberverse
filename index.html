<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aussie Numberverse</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#0f172a, #1e3a5f);
  color: white;
  display: flex;
  justify-content: center;
}

.app {
  max-width: 420px;
  width: 100%;
  padding: 10px;
}

h1 {
  text-align: center;
  font-size: 1.5rem;
  margin: 6px 0;
}

.tagline {
  text-align: center;
  font-size: 0.8rem;
  opacity: 0.8;
  margin-bottom: 6px;
}

/* 🔥 Smaller card */
.card {
  margin-top: 8px;
  background: #8b2c14;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  touch-action: pan-y;
  padding: 12px;
}

/* 🔥 Limit image size */
.card img {
  width: 100%;
  max-height: 260px;
  object-fit: contain;
  display: block;
  border-radius: 10px;
  background: #eee;
}

/* tighter text spacing */
.card-text {
  text-align: center;
  margin-top: 8px;
}

.card-text h2 {
  margin: 0;
  font-size: 1.2rem;
}

.card-text p {
  margin: 6px 0 0;
  font-size: 0.9rem;
}

.controls {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  font-size: 0.9rem;
}

.good { background: #16a34a; color: white; }
.bad { background: #dc2626; color: white; }
.restart { background: #facc15; color: #111; }

.score, .streaks {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 0.8rem;
}

.accuracy {
  text-align: center;
  margin-top: 6px;
  font-size: 0.85rem;
  display: none;
}

/* confetti stays same */
.confetti {
  position: fixed;
  top: -20px;
  opacity: 0.9;
  z-index: 9999;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform: translate(0,-20px) rotate(0deg); }
  100% { transform: translate(var(--x-move),110vh) rotate(720deg); }
}
</style>
</head>

<body>

<div class="app">

<h1>Aussie Numberverse</h1>
<div class="tagline">Where numbers come to life.</div>

<div class="card" id="card" onclick="flipCard()">
  <img id="cardImage" src="">

  <div class="card-text">
    <h2 id="titleText">Who is this?</h2>
    <p id="tapText">👇 Tap to reveal</p>
  </div>
</div>

<div class="controls">
  <button class="good" onclick="mark(true)">I knew it</button>
  <button class="bad" onclick="mark(false)">Missed it</button>
</div>

<div class="controls">
  <button class="restart" onclick="restartSession()">Restart</button>
</div>

<div class="score">
  <div>✅ <span id="correct">0</span></div>
  <div>❌ <span id="wrong">0</span></div>
  <div>Total: <span id="total">0</span></div>
</div>

<div class="streaks">
  <div>🔥 Streak: <span id="streak">0</span></div>
  <div>🏆 Perfect Runs: <span id="perfectRuns">0</span></div>
</div>

<div class="accuracy" id="accuracy"></div>

</div>

<script>
// (kept your logic unchanged for stability)

let masterDeck = [];
let currentDeck = [];
let currentIndex = 0;
let currentCard = null;
let showingFront = true;

let correct = 0;
let wrong = 0;
let total = 0;

let streak = 0;
let perfectRuns = Number(localStorage.getItem("perfectRuns")) || 0;

let missedCards = new Set();
let mainRunHadMiss = false;

const path = "";

function getFile(num, side) {
  return path + "AN_" + num.toString().padStart(3,"0") + side + ".png";
}

function buildMasterDeck() {
  masterDeck = [];
  for (let i = 0; i <= 100; i++) {
    masterDeck.push(i);
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function startDeck(cards) {
  currentDeck = [...cards];
  shuffle(currentDeck);
  currentIndex = 0;
  loadCard();
}

function loadCard() {
  if (currentIndex >= currentDeck.length) return;
  currentCard = currentDeck[currentIndex];
  showingFront = true;

  document.getElementById("cardImage").src = getFile(currentCard,"F");
  document.getElementById("titleText").textContent = "Who is this?";
  document.getElementById("tapText").style.display = "block";
}

function flipCard() {
  showingFront = !showingFront;

  document.getElementById("cardImage").src =
    getFile(currentCard, showingFront ? "F" : "B");

  document.getElementById("titleText").textContent =
    showingFront ? "Who is this?" : "";
  document.getElementById("tapText").style.display =
    showingFront ? "block" : "none";
}

function mark(correctAnswer) {
  total++;

  if (correctAnswer) {
    correct++;
    streak++;
  } else {
    wrong++;
    streak = 0;
  }

  updateUI();
  currentIndex++;
  loadCard();
}

function updateUI() {
  document.getElementById("correct").textContent = correct;
  document.getElementById("wrong").textContent = wrong;
  document.getElementById("total").textContent = total;
  document.getElementById("streak").textContent = streak;
  document.getElementById("perfectRuns").textContent = perfectRuns;
}

function restartSession() {
  correct = 0;
  wrong = 0;
  total = 0;
  streak = 0;

  buildMasterDeck();
  startDeck(masterDeck);
  updateUI();
}

document.addEventListener("DOMContentLoaded", restartSession);
</script>

</body>
</html>
