<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aussie Numberverse</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#0f172a, #1e3a5f);
  color: white;
  display: flex;
  justify-content: center;
}

.app {
  max-width: 420px;
  width: 100%;
  padding: 12px;
}

h1 {
  text-align: center;
  margin: 8px 0 4px;
}

.tagline {
  text-align: center;
  font-size: 0.9rem;
  opacity: 0.85;
}

.card {
  margin-top: 12px;
  background: white;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  touch-action: pan-y;
}

.card img {
  width: 100%;
  display: block;
}

.controls {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
}

.good { background: #16a34a; color: white; }
.bad { background: #dc2626; color: white; }
.restart { background: #facc15; color: #111; }
.replay { background: #fb923c; color: #111; }

.score, .streaks {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.accuracy {
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
  display: none;
}

.confetti {
  position: fixed;
  top: -20px;
  width: 10px;
  height: 14px;
  opacity: 0.9;
  z-index: 9999;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  0% { transform: translateY(-20px) rotate(0deg); }
  100% { transform: translateY(110vh) rotate(720deg); }
}
</style>
</head>

<body>

<div class="app">

<h1>Aussie Numberverse</h1>
<div class="tagline">Where numbers come to life.</div>

<div class="card" id="card" onclick="flipCard()">
  <img id="cardImage" src="" alt="Aussie Numberverse flashcard">
</div>

<div class="controls" id="answerButtons">
  <button class="good" onclick="mark(true)">I knew it</button>
  <button class="bad" onclick="mark(false)">Missed it</button>
</div>

<div class="controls">
  <button class="replay" id="replayBtn" onclick="replayMissed()" style="display:none;">
    Replay Missed Cards
  </button>
  <button class="restart" onclick="restartSession()">Restart</button>
</div>

<div class="score">
  <div>✅ <span id="correct">0</span></div>
  <div>❌ <span id="wrong">0</span></div>
  <div>Total: <span id="total">0</span></div>
</div>

<div class="streaks">
  <div>🔥 Streak: <span id="streak">0</span></div>
  <div>🏆 Perfect Runs: <span id="perfectRuns">0</span></div>
</div>

<div class="accuracy" id="accuracy"></div>

</div>

<script>
let masterDeck = [];
let currentDeck = [];
let currentIndex = 0;
let currentCard = null;
let showingFront = true;

let correct = 0;
let wrong = 0;
let total = 0;

let streak = 0;
let perfectRuns = Number(localStorage.getItem("perfectRuns")) || 0;

let missedCards = new Set();
let confettiPlayed = false;

let replayMode = false;
let mainRunHadMiss = false;

let touchStartX = 0;
let touchEndX = 0;

const swipeDistance = 70;
const path = "";
const firstCard = 0;
const lastCard = 20;

function buildMasterDeck() {
  masterDeck = [];

  for (let i = firstCard; i <= lastCard; i++) {
    masterDeck.push(i);
  }
}

function getFile(num, side) {
  return path + "AN_" + num.toString().padStart(3, "0") + side + ".png";
}

function preloadImage(src) {
  const img = new Image();
  img.src = src;
}

function preloadCurrentAndNext() {
  if (currentCard !== null) {
    preloadImage(getFile(currentCard, "B"));
  }

  const nextCard = currentDeck[currentIndex + 1];

  if (nextCard !== undefined) {
    preloadImage(getFile(nextCard, "F"));
    preloadImage(getFile(nextCard, "B"));
  }

  preloadImage(path + "complete_perfect.png");
  preloadImage(path + "complete_missed.png");
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const temp = arr[i];
    arr[i] = arr[j];
    arr[j] = temp;
  }
}

function startDeck(cards) {
  currentDeck = [...cards];
  shuffle(currentDeck);

  currentIndex = 0;
  currentCard = null;
  showingFront = true;

  document.getElementById("answerButtons").style.display = "flex";
  document.getElementById("replayBtn").style.display = "none";
  document.getElementById("accuracy").style.display = "none";

  loadCard();
}

function loadCard() {
  showingFront = true;

  if (currentIndex >= currentDeck.length) {
    showComplete();
    return;
  }

  currentCard = currentDeck[currentIndex];
  document.getElementById("cardImage").src = getFile(currentCard, "F");

  preloadCurrentAndNext();
}

function flipCard() {
  if (currentCard === null) return;
  if (currentIndex >= currentDeck.length) return;

  showingFront = !showingFront;

  document.getElementById("cardImage").src =
    getFile(currentCard, showingFront ? "F" : "B");
}

function mark(isCorrect) {
  if (currentCard === null) return;
  if (currentIndex >= currentDeck.length) return;

  if (isCorrect) {
    correct++;

    if (!replayMode) {
      streak++;
    }

    if (missedCards.has(currentCard)) {
      missedCards.delete(currentCard);
      wrong--;
    }

  } else {
    if (!replayMode) {
      streak = 0;
      mainRunHadMiss = true;
    }

    if (!missedCards.has(currentCard)) {
      missedCards.add(currentCard);
      wrong++;
    }
  }

  total++;
  updateUI();

  currentIndex++;
  loadCard();
}

function updateUI() {
  document.getElementById("correct").textContent = correct;
  document.getElementById("wrong").textContent = wrong;
  document.getElementById("total").textContent = total;
  document.getElementById("streak").textContent = streak;
  document.getElementById("perfectRuns").textContent = perfectRuns;
}

function showComplete() {
  currentCard = null;
  document.getElementById("answerButtons").style.display = "none";

  const missedCount = missedCards.size;

  const perfectMainRun =
    !replayMode &&
    !mainRunHadMiss &&
    missedCount === 0 &&
    total === masterDeck.length;

  const allMissesFixed =
    replayMode &&
    missedCount === 0;

  if (perfectMainRun) {
    document.getElementById("cardImage").src = path + "complete_perfect.png";

    perfectRuns++;
    localStorage.setItem("perfectRuns", perfectRuns);

    if (!confettiPlayed) {
      launchConfetti();
      confettiPlayed = true;
    }

  } else if (allMissesFixed) {
    document.getElementById("cardImage").src = path + "complete_perfect.png";

    if (!confettiPlayed) {
      launchConfetti();
      confettiPlayed = true;
    }

  } else {
    document.getElementById("cardImage").src = path + "complete_missed.png";
  }

  document.getElementById("replayBtn").style.display =
    missedCount > 0 ? "block" : "none";

  const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;

  const acc = document.getElementById("accuracy");
  acc.style.display = "block";

  if (missedCount > 0) {
    acc.innerHTML =
      "Accuracy: " + accuracy + "%<br>" +
      "You missed " + missedCount + " card" + (missedCount > 1 ? "s" : "");
  } else if (replayMode && mainRunHadMiss) {
    acc.innerHTML =
      "Accuracy: " + accuracy + "%<br>" +
      "All missed cards fixed!";
  } else {
    acc.textContent = "Accuracy: " + accuracy + "%";
  }

  updateUI();
}

function replayMissed() {
  const cards = Array.from(missedCards);
  if (cards.length === 0) return;

  replayMode = true;
  startDeck(cards);
}

function restartSession() {
  correct = 0;
  wrong = 0;
  total = 0;
  streak = 0;

  missedCards.clear();
  confettiPlayed = false;
  currentCard = null;

  replayMode = false;
  mainRunHadMiss = false;

  updateUI();

  buildMasterDeck();
  startDeck(masterDeck);
}

function launchConfetti() {
  const colors = ["#e94f35", "#fbba00", "#ffee00", "#65b33a", "#00aae5", "#3b4395", "#6c4796"];

  for (let i = 0; i < 90; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti";
    piece.style.left = Math.random() * 100 + "vw";
    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 0.8 + "s";
    piece.style.animationDuration = 2.4 + Math.random() * 1.6 + "s";

    document.body.appendChild(piece);

    setTimeout(() => {
      piece.remove();
    }, 4500);
  }
}

const card = document.getElementById("card");

card.addEventListener("touchstart", function(e) {
  touchStartX = e.changedTouches[0].screenX;
});

card.addEventListener("touchend", function(e) {
  touchEndX = e.changedTouches[0].screenX;

  const diff = touchEndX - touchStartX;

  if (Math.abs(diff) < swipeDistance) return;

  if (diff > 0) {
    mark(true);
  } else {
    mark(false);
  }
});

document.addEventListener("DOMContentLoaded", function() {
  updateUI();
  restartSession();
});
</script>

</body>
</html>
