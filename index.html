<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aussie Numberverse</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#0f172a, #1e3a5f);
  color: white;
  display: flex;
  justify-content: center;
}

.app {
  max-width: 420px;
  width: 100%;
  padding: 10px;
}

h1 {
  text-align: center;
  font-size: 1.7rem;
  margin: 8px 0 4px;
}

.tagline {
  text-align: center;
  font-size: 0.85rem;
  opacity: 0.85;
  margin-bottom: 8px;
}

.card {
  margin-top: 8px;
  background: #111;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  transition: transform 0.25s ease;
}

.card img {
  width: 100%;
  height: auto;
  object-fit: contain;
  border-radius: 12px;
}

.controls {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.good { background: #16a34a; color: white; }
.bad { background: #dc2626; color: white; }
.restart { background: #facc15; color: #111; }
.replay { background: #fb923c; color: #111; }

.score, .streaks {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 0.9rem;
}

.accuracy {
  text-align: center;
  margin-top: 8px;
  font-weight: bold;
  display: none;
}

.confetti {
  position: fixed;
  top: -20px;
  opacity: 0.9;
  z-index: 9999;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform: translate(0, -20px) rotate(0deg); }
  100% { transform: translate(var(--x-move), 110vh) rotate(720deg); }
}
</style>
</head>

<body>

<div class="app">

<h1>Aussie Numberverse</h1>
<div class="tagline">Where numbers come to life.</div>

<div class="card" id="card">
  <img id="cardImage" src="" alt="Flashcard">
</div>

<div class="controls" id="answerButtons">
  <button class="good" onclick="mark(true)">I knew it</button>
  <button class="bad" onclick="mark(false)">Missed it</button>
</div>

<div class="controls">
  <button class="replay" id="replayBtn" onclick="replayMissed()" style="display:none;">
    Replay Missed Cards
  </button>
  <button class="restart" onclick="restartSession()">Restart</button>
</div>

<div class="score">
  <div>✅ <span id="correct">0</span></div>
  <div>❌ <span id="wrong">0</span></div>
  <div>Total: <span id="total">0</span></div>
</div>

<div class="streaks">
  <div>🔥 Streak: <span id="streak">0</span></div>
  <div>🏆 Perfect Runs: <span id="perfectRuns">0</span></div>
</div>

<div class="accuracy" id="accuracy"></div>

</div>

<script>
let masterDeck = [];
let currentDeck = [];
let currentIndex = 0;
let currentCard = null;

let correct = 0;
let wrong = 0;
let total = 0;

let streak = 0;
let perfectRuns = Number(localStorage.getItem("perfectRuns")) || 0;

let missedCards = new Set();

let replayMode = false;
let mainRunHadMiss = false;

let startX = 0;
let currentX = 0;
let isDragging = false;

const swipeThreshold = 100;

function buildMasterDeck() {
  masterDeck = Array.from({ length: 101 }, (_, i) => i);
}

function preloadImages() {
  masterDeck.forEach(i => {
    ["F","B"].forEach(side => {
      const img = new Image();
      img.src = getFile(i, side);
    });
  });
}

function getFile(num, side) {
  return "AN_" + num.toString().padStart(3, "0") + side + ".png";
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function startDeck(cards) {
  currentDeck = [...cards];
  shuffle(currentDeck);
  currentIndex = 0;
  loadCard();
}

function loadCard() {
  const card = document.getElementById("card");
  card.style.transition = "none";
  card.style.transform = "translateX(0px)";

  if (currentIndex >= currentDeck.length) {
    showComplete();
    return;
  }

  currentCard = currentDeck[currentIndex];
  document.getElementById("cardImage").src = getFile(currentCard, "F");
}

function mark(isCorrect) {
  if (isCorrect) {
    correct++;
    if (!replayMode) streak++;
  } else {
    if (!replayMode) {
      streak = 0;
      mainRunHadMiss = true;
    }
  }

  total++;
  updateUI();

  currentIndex++;
  setTimeout(loadCard, 200);
}

function updateUI() {
  document.getElementById("correct").textContent = correct;
  document.getElementById("wrong").textContent = wrong;
  document.getElementById("total").textContent = total;
  document.getElementById("streak").textContent = streak;
  document.getElementById("perfectRuns").textContent = perfectRuns;
}

function showComplete() {
  document.getElementById("cardImage").src = "complete_perfect.png";
}

function restartSession() {
  correct = 0;
  wrong = 0;
  total = 0;
  streak = 0;

  if (masterDeck.length === 0) {
    buildMasterDeck();
    preloadImages();
  }

  startDeck(masterDeck);
}

// 🎮 SWIPE ANIMATION
document.addEventListener("DOMContentLoaded", () => {
  restartSession();

  const card = document.getElementById("card");

  card.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    isDragging = true;
  });

  card.addEventListener("touchmove", e => {
    if (!isDragging) return;

    currentX = e.touches[0].clientX;
    const diff = currentX - startX;

    card.style.transform = `translateX(${diff}px) rotate(${diff * 0.05}deg)`;
  });

  card.addEventListener("touchend", () => {
    isDragging = false;

    const diff = currentX - startX;

    if (Math.abs(diff) > swipeThreshold) {
      const direction = diff > 0 ? 1 : -1;

      card.style.transition = "transform 0.3s ease";
      card.style.transform = `translateX(${direction * 500}px) rotate(${direction * 20}deg)`;

      setTimeout(() => {
        mark(diff > 0);
      }, 200);

    } else {
      card.style.transition = "transform 0.3s ease";
      card.style.transform = "translateX(0px)";
    }
  });
});
</script>

</body>
</html>
