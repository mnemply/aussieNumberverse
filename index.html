<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aussie Numberverse</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#0f172a, #1e3a5f);
  color: white;
  display: flex;
  justify-content: center;
}

.app {
  max-width: 420px;
  width: 100%;
  padding: 10px;
}

.card {
  margin-top: 8px;
  background: #111;
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  justify-content: center;
  padding: 10px;
}

.card img {
  width: 100%;
  border-radius: 12px;
}

.controls {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.good { background: #16a34a; }
.bad { background: #dc2626; }
.restart { background: #facc15; }

.score, .streaks {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

.accuracy {
  text-align: center;
  margin-top: 8px;
  font-weight: bold;
  display: none;
}
</style>
</head>

<body>

<div class="app">

<div class="card" id="card">
  <img id="cardImage">
</div>

<div class="controls">
  <button class="good" onclick="mark(true)">I knew it</button>
  <button class="bad" onclick="mark(false)">Missed it</button>
</div>

<div class="controls">
  <button class="restart" onclick="restartSession()">Restart</button>
</div>

<div class="score">
  <div>✅ <span id="correct">0</span></div>
  <div>❌ <span id="wrong">0</span></div>
  <div>Total: <span id="total">0</span></div>
</div>

<div class="streaks">
  <div>🔥 <span id="streak">0</span></div>
  <div>🏆 <span id="perfectRuns">0</span></div>
</div>

<div class="accuracy" id="accuracy"></div>

</div>

<script>
let masterDeck = [];
let currentDeck = [];
let currentIndex = 0;
let currentCard = null;
let showingFront = true;

let correct = 0;
let wrong = 0;
let total = 0;
let streak = 0;

let perfectRuns = Number(localStorage.getItem("perfectRuns")) || 0;

let touchStartX = 0;
let touchEndX = 0;
const swipeDistance = 70;
let moved = false;

function buildMasterDeck() {
  masterDeck = Array.from({ length: 101 }, (_, i) => i);
}

function getFile(n, s) {
  return "AN_" + n.toString().padStart(3,"0") + s + ".png";
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function startDeck(cards){
  currentDeck=[...cards];
  shuffle(currentDeck);
  currentIndex=0;
  loadCard();
}

function loadCard(){
  showingFront = true;

  if(currentIndex>=currentDeck.length){
    showComplete();
    return;
  }

  currentCard=currentDeck[currentIndex];
  document.getElementById("cardImage").src=getFile(currentCard,"F");
}

function flipCard(){
  if(moved || currentCard===null) return;

  showingFront = !showingFront;
  document.getElementById("cardImage").src =
    getFile(currentCard, showingFront ? "F" : "B");
}

function mark(isCorrect){
  if(currentCard===null) return;

  if(isCorrect){
    correct++;
    streak++;
  } else {
    wrong++;
    streak = 0;
  }

  total++;
  updateUI();

  currentIndex++;
  loadCard();
}

function updateUI(){
  document.getElementById("correct").textContent=correct;
  document.getElementById("wrong").textContent=wrong;
  document.getElementById("total").textContent=total;
  document.getElementById("streak").textContent=streak;
  document.getElementById("perfectRuns").textContent=perfectRuns;
}

function showComplete(){
  currentCard = null;

  let image = "";
  
  if(wrong === 0){
    image = "complete_perfect.png";
    perfectRuns++;
    localStorage.setItem("perfectRuns", perfectRuns);
  } else {
    image = "complete_missed.png";
  }

  document.getElementById("cardImage").src = image;

  const accuracy = Math.round((correct / total) * 100);
  const acc = document.getElementById("accuracy");
  acc.style.display = "block";
  acc.textContent = "Accuracy: " + accuracy + "%";
}

function restartSession(){
  correct=0;
  wrong=0;
  total=0;
  streak=0;

  updateUI(); // 🔥 FIX HERE

  document.getElementById("accuracy").style.display = "none";

  if(masterDeck.length===0) buildMasterDeck();
  startDeck(masterDeck);
}

document.addEventListener("DOMContentLoaded",()=>{
  restartSession();

  const card=document.getElementById("card");

  card.addEventListener("click",flipCard);

  card.addEventListener("touchstart",e=>{
    moved=false;
    touchStartX=e.changedTouches[0].screenX;
  });

  card.addEventListener("touchend",e=>{
    touchEndX=e.changedTouches[0].screenX;
    const diff=touchEndX-touchStartX;

    if(Math.abs(diff)>swipeDistance){
      moved=true;
      diff>0?mark(true):mark(false);
    }
  });
});
</script>

</body>
</html>
