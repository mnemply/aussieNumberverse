<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aussie Numberverse</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#0f172a, #1e3a5f);
  color: white;
  display: flex;
  justify-content: center;
}

.app {
  max-width: 420px;
  width: 100%;
  padding: 12px;
}

h1 { text-align: center; }

.tagline {
  text-align: center;
  font-size: 0.9rem;
  opacity: 0.85;
}

.card {
  margin-top: 12px;
  background: white;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  touch-action: pan-y;
}

.card img {
  width: 100%;
  display: block;
}

.controls {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
}

.good { background: #16a34a; color: white; }
.bad { background: #dc2626; color: white; }
.restart { background: #facc15; color: #111; }
.replay { background: #fb923c; color: #111; }

.score, .streaks {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.accuracy {
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
  display: none;
}
</style>
</head>

<body>

<div class="app">

<h1>Aussie Numberverse</h1>
<div class="tagline">Where numbers come to life.</div>

<div class="card" id="card" onclick="flipCard()">
  <img id="cardImage" src="">
</div>

<div class="controls" id="answerButtons">
  <button class="good" onclick="mark(true)">I knew it</button>
  <button class="bad" onclick="mark(false)">Missed it</button>
</div>

<div class="controls">
  <button class="replay" id="replayBtn" onclick="replayMissed()" style="display:none;">
    Replay Missed Cards
  </button>
  <button class="restart" onclick="restartSession()">Restart</button>
</div>

<div class="score">
  <div>✅ <span id="correct">0</span></div>
  <div>❌ <span id="wrong">0</span></div>
  <div>Total: <span id="total">0</span></div>
</div>

<div class="streaks">
  <div>🔥 Streak: <span id="streak">0</span></div>
  <div>🏆 Perfect Runs: <span id="perfectRuns">0</span></div>
</div>

<div class="accuracy" id="accuracy"></div>

</div>

<script>
let masterDeck = [];
let currentDeck = [];
let currentIndex = 0;
let currentCard = null;
let showingFront = true;

let correct = 0;
let wrong = 0;
let total = 0;

let streak = 0;
let perfectRuns = Number(localStorage.getItem("perfectRuns")) || 0;

let missedCards = new Set();
let confettiPlayed = false;

let replayMode = false;
let mainRunHadMiss = false;

let touchStartX = 0;
let touchEndX = 0;
const swipeDistance = 70;

const path = "";

// 🔥 FAST auto-detect
async function buildMasterDeck() {
  masterDeck = [];

  let i = 0;

  while (true) {
    const front = path + "AN_" + i.toString().padStart(3, "0") + "F.png";
    const back = path + "AN_" + i.toString().padStart(3, "0") + "B.png";

    const exists = await imagePairExists(front, back);

    if (!exists) break;

    masterDeck.push(i);
    i++;
  }
}

// check both images exist
function imagePairExists(front, back) {
  return new Promise(resolve => {
    let loaded = 0;

    const f = new Image();
    const b = new Image();

    f.onload = b.onload = () => {
      loaded++;
      if (loaded === 2) resolve(true);
    };

    f.onerror = b.onerror = () => resolve(false);

    f.src = front;
    b.src = back;
  });
}

function getFile(num, side) {
  return path + "AN_" + num.toString().padStart(3, "0") + side + ".png";
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const temp = arr[i];
    arr[i] = arr[j];
    arr[j] = temp;
  }
}

function startDeck(cards) {
  currentDeck = [...cards];
  shuffle(currentDeck);

  currentIndex = 0;
  currentCard = null;
  showingFront = true;

  document.getElementById("answerButtons").style.display = "flex";
  document.getElementById("replayBtn").style.display = "none";
  document.getElementById("accuracy").style.display = "none";

  loadCard();
}

function loadCard() {
  showingFront = true;

  if (currentIndex >= currentDeck.length) {
    showComplete();
    return;
  }

  currentCard = currentDeck[currentIndex];
  document.getElementById("cardImage").src = getFile(currentCard, "F");
}

function flipCard() {
  if (currentCard === null) return;
  showingFront = !showingFront;

  document.getElementById("cardImage").src =
    getFile(currentCard, showingFront ? "F" : "B");
}

function mark(isCorrect) {
  if (currentCard === null) return;

  if (isCorrect) {
    correct++;
    if (!replayMode) streak++;

    if (missedCards.has(currentCard)) {
      missedCards.delete(currentCard);
      wrong--;
    }

  } else {
    if (!replayMode) {
      streak = 0;
      mainRunHadMiss = true;
    }

    if (!missedCards.has(currentCard)) {
      missedCards.add(currentCard);
      wrong++;
    }
  }

  total++;
  updateUI();

  currentIndex++;
  loadCard();
}

function updateUI() {
  document.getElementById("correct").textContent = correct;
  document.getElementById("wrong").textContent = wrong;
  document.getElementById("total").textContent = total;
  document.getElementById("streak").textContent = streak;
  document.getElementById("perfectRuns").textContent = perfectRuns;
}

function showComplete() {
  document.getElementById("answerButtons").style.display = "none";

  const missedCount = missedCards.size;
  const perfect = missedCount === 0;

  document.getElementById("cardImage").src =
    path + (perfect ? "complete_perfect.png" : "complete_missed.png");

  if (perfect) {
    perfectRuns++;
    localStorage.setItem("perfectRuns", perfectRuns);
  }

  document.getElementById("replayBtn").style.display =
    missedCount > 0 ? "block" : "none";

  const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;

  const acc = document.getElementById("accuracy");
  acc.style.display = "block";
  acc.innerHTML =
    "Accuracy: " + accuracy + "%<br>" +
    (missedCount > 0
      ? "You missed " + missedCount + " card" + (missedCount > 1 ? "s" : "")
      : "");
}

function replayMissed() {
  replayMode = true;
  startDeck(Array.from(missedCards));
}

async function restartSession() {
  correct = 0;
  wrong = 0;
  total = 0;
  streak = 0;

  missedCards.clear();
  replayMode = false;
  mainRunHadMiss = false;

  updateUI();

  await buildMasterDeck();
  startDeck(masterDeck);
}

// swipe
const card = document.getElementById("card");

card.addEventListener("touchstart", e => {
  touchStartX = e.changedTouches[0].screenX;
});

card.addEventListener("touchend", e => {
  touchEndX = e.changedTouches[0].screenX;

  const diff = touchEndX - touchStartX;

  if (Math.abs(diff) < swipeDistance) return;

  diff > 0 ? mark(true) : mark(false);
});

document.addEventListener("DOMContentLoaded", restartSession);
</script>

</body>
</html>
